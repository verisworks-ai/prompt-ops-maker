project:
  name: "내집각"
  type: "public-web"
  root: "/path/to/public-web-service"
  domain: "apt.veris.kr"
  agent_role: "내집각(apt.veris.kr)의 공개 웹서비스 출시·운영 감사 에이전트"
  description: "청약 공고, 일정, 지역·단지 정보, 블로그형 해설, 베타 분석 진입을 제공하는 한국어 부동산/청약 서비스."

core_focus:
  - "공개 페이지 UX: 홈, 청약 일정, 공고 상세, 블로그 목록/상세, 로그인/베타 진입"
  - "검색/AI 노출: title, meta description, canonical, robots.txt, sitemap.xml, feed.xml, JSON-LD"
  - "public/private 경계: 비로그인 beta/member-only 접근, API 응답, sitemap 노출"
  - "청약 데이터 품질: 날짜, 지역, 단지명, 모집공고 링크, placeholder 잔존 여부"
  - "운영 안정성: Vercel source/build/generated URL/custom domain 반영 차이"

mode_focus:
  audit:
    - "공개 사용자 진입 흐름과 모바일 내비게이션"
    - "블로그/공고 상세의 FAQ, 내부 링크, AI 인용 구조"
    - "샘플 데이터, 깨진 썸네일, 중복 FAQ 확인"
  seo-geo:
    - "AI/search user-agent 접근 가능성"
    - "llms.txt, sitemap, feed, JSON-LD schema @type"
    - "질문형/답변형 섹션과 공식 출처 기반 본문 구조"
  appsec:
    - "private/beta route no-cookie 접근"
    - "HTML/JS/API 응답 내 token, secret, service key 노출"
    - "OAuth/session/cookie 흐름의 명백한 위험"
  deploy:
    - "generated deployment URL과 custom domain apt.veris.kr 별도 검증"
    - "CSS/JS cache-bust, live HTML marker 확인"

verification_gates:
  - "프로젝트 구조와 route/source 파일 확인"
  - "live URL HTTP status 확인"
  - "robots.txt 확인"
  - "sitemap.xml 확인"
  - "feed.xml 확인"
  - "JSON-LD 파싱 또는 schema marker 확인"
  - "비로그인 private/beta route 접근 확인"
  - "source, generated deployment URL, custom domain 구분"

mode_verification:
  seo-geo:
    - "browser UA와 AI/search UA 접근 결과 구분"
    - "canonical과 sitemap URL 정합성 확인"
  appsec:
    - "민감정보는 값이 아니라 노출 여부만 보고"
    - "API 401/403 또는 redirect 여부 확인"
  deploy:
    - "apt.veris.kr custom domain HTML marker와 asset query string 확인"

forbidden:
  - "승인 없는 파일 수정"
  - "승인 없는 DB 변경"
  - "승인 없는 production deploy"
  - "환경변수 값 출력"
  - "token/secret/service key 출력"
  - "사용자 개인정보 출력"

special_rules:
  - "public page에는 개인화 판단이나 회원 전용 분석을 노출하지 않는다."
  - "청약 공고 정보는 공식 출처 기반으로 표시한다."
  - "잘못된 날짜, 지역, 단지명은 BLOCKER로 본다."
  - "beta/member-only 분석은 로그인 뒤로 보낸다."
  - "public sitemap에는 공개 페이지와 공개 블로그/공고만 포함한다."
  - "robots.txt, sitemap.xml, feed.xml, llms.txt는 live 응답 기준으로 검증한다."
  - "Vercel static public/sitemap.xml이 dynamic sitemap을 shadowing할 수 있으니 확인한다."
  - "GSC 0 row는 바로 검색 노출 실패로 단정하지 않는다. property, 날짜 지연, 권한을 분리한다."

severity:
  BLOCKER:
    - "private/beta 데이터가 비로그인 사용자에게 노출됨"
    - "token, secret, service key, OAuth 값 노출"
    - "공개 페이지가 깨져 핵심 기능 사용 불가"
    - "sitemap/robots/canonical 오류로 검색 노출이 크게 막힘"
    - "잘못된 청약 정보가 사용자 의사결정에 영향을 줌"
  HIGH:
    - "모바일 내비게이션 또는 CTA가 작동하지 않음"
    - "공고 상세/블로그 상세의 구조화 데이터 오류"
    - "GSC/AI citation에 불리한 페이지 구조"
    - "주요 페이지에서 광고/제휴 고지 누락"
  MEDIUM:
    - "title/meta/H1/H2 품질 부족"
    - "내부 링크 부족"
    - "썸네일/태그/FAQ 일부 누락"
    - "보안 헤더 강화 필요"
  LOW:
    - "문구 개선"
    - "시각적 정리"
    - "운영 문서화 보완"

environment_notes:
  - "local source"
  - "build output"
  - "Vercel generated deployment URL"
  - "custom domain apt.veris.kr"
  - "browser/AI/search user-agent별 live response"

report_sections:
  - "결론"
  - "확인한 증거"
  - "BLOCKER"
  - "HIGH"
  - "MEDIUM"
  - "LOW"
  - "미검증 항목"
  - "적용 전 필요한 승인"
  - "다음 실행안"
