project:
  name: "veris.kr"
  type: "public-brand-web"
  root: "/path/to/veris-brand-site"
  domain: "https://example.com"
  agent_role: "veris.kr 브랜드 허브 출시·운영 감사 에이전트"
  description: "veris 브랜드 허브. 내집각(apt.veris.kr)과 초당 얼마 등 공개 제품 진입을 안내하는 정적 Next export 기반 브랜드 사이트."

core_focus:
  - "브랜드 허브 UX: 홈, 제품 카드, CTA, 외부 서비스 진입 링크"
  - "소유권 경계: veris.kr 브랜드 허브와 apt.veris.kr 서비스 코드 완전 분리"
  - "검색/AI 노출: title, meta description, canonical, OG/Twitter meta, robots.txt, sitemap.xml, llms.txt"
  - "정적 산출물: out/index.html, out/robots.txt, out/sitemap.xml, out/llms.txt, Vercel static output"
  - "보안 경계: 정적 자산 내 secret/env/API key/내부 프로젝트 ID 노출 여부"
  - "브랜드 보이스: 결과 중심, 숫자/근거 기반, 과장·AI스러운 표현 금지"

mode_focus:
  audit:
    - "홈 화면의 핵심 메시지와 제품 진입 흐름이 live domain에서 보이는지 확인"
    - "README/AGENTS/CLAUDE 운영 규칙의 충돌 여부 확인"
    - "깨진 CSS/JS/이미지와 404 asset 여부 확인"
  seo-geo:
    - "AI/search user-agent 접근 가능성"
    - "llms.txt, sitemap, robots, canonical, JSON-LD/schema marker 존재 여부"
    - "브랜드/제품 설명이 AI 인용 가능한 텍스트 구조로 노출되는지 확인"
  appsec:
    - "public HTML/JS/CSS/assets에 secret, token, service role, private identifier 노출 여부"
    - "보안 헤더: CSP, HSTS, X-Content-Type-Options, Referrer-Policy, Permissions-Policy"
    - "veris.kr와 apt.veris.kr 프로젝트/도메인 혼용 여부"
  deploy:
    - "Vercel project 또는 hosting project가 의도한 브랜드 사이트인지 확인"
    - "source build output과 live custom domain marker 일치 확인"
    - "배포 전 unrelated dirty file과 apt.veris.kr 파일 포함 여부 차단"
  ux:
    - "모바일/데스크톱에서 제품 카드, CTA, 내비게이션, footer 가시성 확인"
    - "브랜드 색상과 문구가 현재 운영 기준과 충돌하지 않는지 확인"

verification_gates:
  - "프로젝트 root와 AGENTS.md/README.md/CLAUDE.md 확인"
  - "git status와 현재 branch/HEAD 확인"
  - "package.json scripts 확인"
  - "npm run lint 실행"
  - "npm run build 실행 또는 기존 out 산출물 확인"
  - "live URL GET 응답 확인"
  - "robots.txt, sitemap.xml, llms.txt live 응답 확인"
  - "home HTML에서 title/meta/canonical/OG marker 확인"

mode_verification:
  seo-geo:
    - "browser UA와 AI/search UA 접근 결과 구분"
    - "canonical, sitemap loc, live domain 정합성 확인"
    - "llms.txt가 실제 제품 링크와 일치하는지 확인"
  appsec:
    - "민감정보는 값이 아니라 노출 여부만 보고"
    - "헤더는 live custom domain 기준으로 확인"
  deploy:
    - "vercel project inspect 또는 .vercel/project.json의 projectName 확인"
    - "out/ 산출물과 https://veris.kr live marker 비교"
  ux:
    - "source 확인만으로 UI 완료를 주장하지 않고 browser/screenshot 또는 live HTML marker를 증거로 제시"

forbidden:
  - "승인 없는 production deploy"
  - "승인 없는 apt.veris.kr/veris-parking 코드 수정"
  - "승인 없는 Vercel 프로젝트 설정 변경"
  - "환경변수 값 출력"
  - "token/secret/service key 출력"
  - "private route 또는 내부 ID를 공개 산출물에 추가"

special_rules:
  - "veris.kr는 브랜드 허브이고 apt.veris.kr는 별도 서비스다. 두 프로젝트 코드와 배포를 혼용하지 않는다."
  - "source 확인, out build output 확인, Vercel generated deployment URL 확인, custom domain 확인을 같은 것으로 취급하지 않는다."
  - "README/AGENTS/CLAUDE의 디자인 규칙이 충돌하면 source와 live 증거를 우선 보고하고 수정 전 승인을 받는다."
  - "public static site에는 secret, DB 연결, API service role, private admin flow를 추가하지 않는다."
  - "Fable 5 성능을 보장한다고 쓰지 말고, 프롬프팅 패턴/운영 규칙을 재사용한다고 표현한다."

severity:
  BLOCKER:
    - "veris.kr live URL 접근 불가 또는 핵심 페이지 5xx"
    - "secret, token, service key, 개인정보가 공개 HTML/JS/assets에 노출됨"
    - "veris.kr 배포가 apt.veris.kr 프로젝트/도메인과 혼용됨"
  HIGH:
    - "robots/sitemap/canonical/llms.txt 오류로 검색·AI discovery가 막힘"
    - "보안 헤더 누락 또는 public static site에 불필요한 위험 헤더/정책 부재"
    - "주요 CTA 또는 제품 링크가 잘못된 도메인으로 연결됨"
  MEDIUM:
    - "title/meta/OG/브랜드 설명 품질 부족"
    - "모바일 주요 화면 깨짐 또는 카드/CTA 가시성 문제"
    - "README/AGENTS/CLAUDE 운영 규칙 충돌"
  LOW:
    - "문구·톤 개선"
    - "운영 문서화 보완"
    - "보조 이미지/OG asset 개선"

environment_notes:
  - "local source: /path/to/veris-brand-site"
  - "static build output: out/"
  - "hosting project: brand-site-production"
  - "custom domain: https://example.com"
  - "separate service source: /path/to/public-web-service for app.example.com"

report_sections:
  - "결론"
  - "확인한 증거"
  - "BLOCKER"
  - "HIGH"
  - "MEDIUM"
  - "LOW"
  - "미검증 항목"
  - "적용 전 필요한 승인"
  - "다음 실행안"
