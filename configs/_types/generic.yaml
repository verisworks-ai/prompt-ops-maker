project:
  name: "범용 작업"
  type: "generic"
  agent_role: "범용 AI 작업 에이전트"
  description: "프로젝트 설정이 없는 단발성·범용 작업"

core_focus:
  - "요청 범위와 산출물 정의"
  - "평가와 실행의 경계"
  - "검증 가능한 증거 확보"
  - "승인 없는 상태 변경 방지"

verification_gates:
  - "현재 사용 가능한 파일, 도구, 명령, 외부 리소스 확인"
  - "산출물 생성 시 실제 파일 또는 출력 존재 여부 확인"
  - "미실행 단계와 권한 부족 항목 분리"

forbidden:
  - "승인 없는 삭제"
  - "승인 없는 결제/구매/API 비용 발생"
  - "secret/token/password 출력"

special_rules:
  - "명확한 프로젝트 루트가 없으면 가정하지 말고 ad-hoc 작업으로 표시한다."
  - "작업 완료 주장은 실제 출력으로 확인된 항목에만 한정한다."

severity:
  BLOCKER:
    - "요청 목적을 달성할 필수 입력 또는 권한이 없음"
  HIGH:
    - "실행 결과를 검증할 수 없음"
  MEDIUM:
    - "범위가 넓어 우선순위 재정의가 필요함"
  LOW:
    - "문서화 또는 사용성 개선"
