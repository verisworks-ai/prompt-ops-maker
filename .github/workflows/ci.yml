name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    uses: verisworks-ai/.github/.github/workflows/security-baseline.yml@main
    with:
      language: python

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[test]" ruff build

      - name: Compile
        run: python -m compileall -q .

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/prompt-ops-maker-smoke
          /tmp/prompt-ops-maker-smoke/bin/python -m pip install dist/*.whl
          /tmp/prompt-ops-maker-smoke/bin/prompt-ops-maker list-types
          /tmp/prompt-ops-maker-smoke/bin/prompt-ops-maker make-adhoc \
            --name ci-smoke \
            --type automation-pipeline \
            --task 'CI package smoke test' \
            --risk 'missing package data' \
            --effort medium \
            --target-ai codex \
            --environment local \
            --dry-run

      - name: Schema validation
        run: |
          python -c "
          import json, pathlib, sys
          schema_dir = pathlib.Path('schemas')
          if not schema_dir.exists():
              sys.exit(0)
          errors = []
          for f in schema_dir.glob('**/*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(f'::error::{e}')
              sys.exit(1)
          print(f'schemas: {len(list(schema_dir.glob(\"**/*.json\")))} files valid ✓')
          "
