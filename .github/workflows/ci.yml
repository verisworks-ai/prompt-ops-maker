name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e '.[test]'

      - name: Run tests
        run: python -m pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/prompt-ops-maker-smoke
          /tmp/prompt-ops-maker-smoke/bin/python -m pip install dist/*.whl
          /tmp/prompt-ops-maker-smoke/bin/prompt-ops-maker list-types
          /tmp/prompt-ops-maker-smoke/bin/prompt-ops-maker make-adhoc \
            --name ci-smoke \
            --type automation-pipeline \
            --task 'CI package smoke test' \
            --risk 'missing package data' \
            --effort medium \
            --target-ai codex \
            --environment local \
            --dry-run
